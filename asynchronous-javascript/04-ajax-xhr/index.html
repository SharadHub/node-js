<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AJAX & XHR OBJECT</title>
    <style>
        *,
        *::before,
        *::after{
            box-sizing: border-box;
            padding: 0;
            margin: 0;
        }

        body{
            font-family: 'Poppins';
            line-height: 1.5;
            padding: 0 40px;
        }

        h1{
            text-align: center;
            line-height: 1.3;
        }
        button{
            display: inline-block;
            background: #333;
            border: 0;
            color: #fff;
            padding: 15px 20px;
            text-decoration: none;
            margin: 20px;
            cursor: pointer;
        }
        button:hover{
            background: #555;
        }
        ul{
            padding: 0;
        }
        li{
            list-style: none;
            background: #f4f4f4;
            margin-bottom: 5px;
            padding: 5px;
        }
    </style>
</head>
<body>
    <h1>AJAX & XHR OBJECTS</h1>
    <ul id="results"></ul>

    <script src="app.js"></script>
</body>
</html>
